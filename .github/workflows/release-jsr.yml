name: release-jsr

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.8

      - name: Verify release metadata
        shell: bash
        run: |
          VERSION="$(deno eval 'const config = JSON.parse(await Deno.readTextFile("deno.json")); console.log(config.version);')"
          if [ "${GITHUB_REF_NAME}" != "v${VERSION}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match deno.json version ${VERSION}."
            exit 1
          fi

          RELEASE_NOTES="documentation/notes/release-notes.v${VERSION}.md"
          if [ ! -s "${RELEASE_NOTES}" ]; then
            echo "Missing non-empty release notes: ${RELEASE_NOTES}"
            exit 1
          fi

      - name: Check formatting
        run: deno task fmt:check

      - name: Lint
        run: deno task lint

      - name: Type-check
        run: deno task check

      - name: Check JSR package
        run: deno task publish:dry-run

      - name: Run tests
        run: deno task test

      - name: Publish to JSR
        run: deno publish
