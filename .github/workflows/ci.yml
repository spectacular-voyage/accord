name: ci

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.8

      - name: Check formatting
        run: deno task fmt:check

      - name: Lint
        run: deno task lint

      - name: Type-check
        run: deno task check

      - name: Run tests with coverage
        run: deno test --allow-read --allow-write --allow-run --coverage=coverage tests

      - name: Generate coverage artifacts
        run: deno coverage coverage --lcov > coverage/lcov.info

      - name: Upload coverage artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: warn
